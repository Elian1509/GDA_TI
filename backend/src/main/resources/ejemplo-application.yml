spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/NOMBRE_BD
    username: USUARIO
    password: PASSWORD
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

    flyway:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true
  logging:
    level:
      org.flywaydb: DEBUG